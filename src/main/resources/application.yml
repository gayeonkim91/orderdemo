spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://db:3306/orderdemo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app1234}
    hikari:
      connection-init-sql: SET SESSION innodb_lock_wait_timeout = 3
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
