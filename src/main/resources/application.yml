spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://db:3306/orderdemo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app1234}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
